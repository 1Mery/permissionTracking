<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Personel Detay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">

    <div class="d-flex align-items-center justify-content-between mb-3">
        <div>
            <a class="text-decoration-none" href="/ui/personels">← Liste</a>
            <h3 class="m-0" th:text="${personel.name + ' ' + personel.surname}"></h3>
            <div class="text-muted" th:text="${personel.department}"></div>
        </div>

        <a class="btn btn-success"
           th:href="@{/ui/permissions/new(personelId=${personel.id})}">
            + Yeni İzin
        </a>
    </div>

    <!-- başarı mesajı -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="row g-3 mb-3">
        <div class="col-md-3">
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="text-muted">Toplam</div>
                    <div class="fs-4 fw-semibold" th:text="${summary.totalLeaveDays}"></div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="text-muted">Kullanılan</div>
                    <div class="fs-4 fw-semibold" th:text="${summary.totalUsedDays}"></div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="text-muted">Kalan</div>
                    <div class="fs-4 fw-semibold" th:text="${summary.remainingDays}"></div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="text-muted">İşe Dönüş</div>
                    <div class="fs-5 fw-semibold" th:text="${summary.nextWorkDate}"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-white">
            <strong>İzin Listesi</strong>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped align-middle mb-0">
                    <thead>
                    <tr>
                        <th>Başlangıç</th>
                        <th>Bitiş</th>
                        <th class="text-end">Gün</th>
                        <th>Tür</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="l : ${leaves}">
                        <td th:text="${l.startDate}"></td>
                        <td th:text="${l.endDate}"></td>
                        <td class="text-end" th:text="${l.usedDays}"></td>
                        <td th:text="${l.permissionType}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${#lists.isEmpty(leaves)}" class="text-muted mt-3">
                Henüz izin kaydı yok.
            </div>
        </div>
    </div>

</div>
</body>
</html>
