<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yeni Personel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width: 720px;">

    <div class="mb-3">
        <a class="text-decoration-none" href="/ui/personels">← Liste</a>
        <h3 class="m-0">Yeni Personel</h3>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form method="post" action="/ui/personels" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Ad</label>
                    <input class="form-control" name="name" required />
                </div>

                <div class="col-md-6">
                    <label class="form-label">Soyad</label>
                    <input class="form-control" name="surname" required />
                </div>

                <div class="col-12">
                    <label class="form-label">Birim</label>
                    <input class="form-control" name="department" required />
                </div>

                <div class="col-12">
                    <label class="form-label">Toplam Yıllık İzin (gün)</label>
                    <input class="form-control" type="number" min="0" name="totalLeaveDays" required />
                </div>

                <div class="col-12 d-flex gap-2">
                    <button class="btn btn-primary" type="submit">Kaydet</button>
                    <a class="btn btn-outline-secondary" href="/ui/personels">İptal</a>
                </div>
            </form>
        </div>
    </div>

</div>
</body>
</html>
