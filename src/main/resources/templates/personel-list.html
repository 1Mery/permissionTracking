<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Personel Listesi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">

    <div class="d-flex align-items-start justify-content-between mb-3 gap-3">
        <div>
            <h3 class="m-0">Personel Listesi</h3>
            <div class="text-muted small">İsim veya soyisim ile arayabilirsiniz</div>
        </div>

        <div class="d-flex gap-2 flex-wrap justify-content-end">
            <form class="d-flex gap-2" method="get" action="/ui/users">
                <input class="form-control" type="text" name="q" placeholder="İsim / Soyisim ara"
                       th:value="${q}">
                <button class="btn btn-outline-primary" type="submit">Ara</button>
                <a class="btn btn-outline-secondary" href="/ui/users">Temizle</a>
            </form>

            <a class="btn btn-success" href="/ui/users/new">+ Yeni Personel</a>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-secondary">
                    <tr>
                        <th>ID</th>
                        <th>Ad Soyad</th>
                        <th>Birim</th>
                        <th class="text-end">Toplam İzin</th>
                        <th class="text-end">İşlem</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p : ${users}">
                        <td th:text="${p.id}"></td>
                        <td th:text="${p.name + ' ' + p.surname}"></td>
                        <td th:text="${p.department}"></td>
                        <td class="text-end" th:text="${p.totalLeaveDays}"></td>
                        <td class="text-end">
                            <a class="btn btn-sm btn-primary" th:href="@{/ui/users/{id}(id=${p.id})}">Detay</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${#lists.isEmpty(users)}" class="text-muted mt-3">
                Henüz user kaydı yok.
            </div>
        </div>
    </div>

</div>
</body>
</html>
